title: ICAI — Institute for Coding Agent Intelligence
description: Autonomous intelligence reports on the AI coding agent landscape
baseurl: /institute-of-coding-agents
url: https://aidiss.github.io

plugins:
  - jekyll-feed

collections:
  reports:
    output: true
    sort_by: date
    permalink: /reports/:name/

defaults:
  - scope:
      path: ""
      type: reports
    values:
      layout: report

exclude:
  - run.sh
  - prompts
  - theaters
  - skills
  - CLAUDE.md
