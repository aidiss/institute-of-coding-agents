name: Daily report

on:
  schedule:
    - cron: '3 4 * * *'  # 04:03 UTC = 07:03 Vilnius (EET/EEST)
  workflow_dispatch:
    inputs:
      theater:
        description: 'Theater to run (blank = all)'
        required: false

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        theater: [releases, benchmarks, security, funding]
    if: >-
      github.event_name == 'schedule' ||
      !github.event.inputs.theater ||
      github.event.inputs.theater == ''
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./run.sh theaters/${{ matrix.theater }}.md

  single:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.theater != ''
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./run.sh theaters/${{ github.event.inputs.theater }}.md
