---
layout: default
---
<main>
  <a class="back-link" href="{{ '/' | relative_url }}">&larr; All reports</a>

  <h1>{{ page.title }}</h1>

  <div class="report-meta">
    <span class="badge">Daily Brief</span>
    <span>{{ page.date | date: "%B %-d, %Y" }}</span>
    {% if page.analyst %}<span>Analyst: {{ page.analyst }}</span>{% endif %}
    {% if page.prompt_url %}<span><a href="{{ page.prompt_url }}">Prompt {{ page.prompt_hash | truncate: 11, "" }}</a></span>{% endif %}
  </div>

  {{ content }}
</main>
