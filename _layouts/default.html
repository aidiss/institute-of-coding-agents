<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a2240;
      --navy-light: #143564;
      --gold: #b8963e;
      --gold-light: #d4b76a;
      --bg: #f8f7f4;
      --bg-card: #ffffff;
      --text: #1a1a1a;
      --text-muted: #5a6270;
      --border: #e2e0db;
      --max-width: 820px;
      --max-width-wide: 1080px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
    }

    /* — Header — */
    header {
      background: var(--navy);
      border-bottom: 3px solid var(--gold);
    }
    .header-inner {
      max-width: var(--max-width-wide);
      margin: 0 auto;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-title {
      font-family: 'Libre Baskerville', serif;
      color: #fff;
      font-size: 1.15rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .site-title span {
      color: var(--gold);
    }
    .header-nav a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      margin-left: 1.5rem;
      transition: color 0.2s;
    }
    .header-nav a:hover { color: var(--gold-light); }

    /* — Main — */
    main {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
    }
    main.wide {
      max-width: var(--max-width-wide);
    }

    /* — Typography — */
    h1, h2, h3 {
      font-family: 'Libre Baskerville', serif;
      color: var(--navy);
      line-height: 1.3;
    }
    h1 { font-size: 1.75rem; margin-bottom: 0.75rem; }
    h2 {
      font-size: 1.25rem;
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid var(--gold);
    }
    h3 {
      font-size: 1.05rem;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
      color: var(--navy-light);
    }
    p { margin-bottom: 1rem; }
    a { color: var(--navy-light); }
    a:hover { color: var(--gold); }
    strong { font-weight: 600; }
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    /* — Lists — */
    ul, ol {
      margin: 0 0 1rem 1.25rem;
    }
    li { margin-bottom: 0.35rem; }

    /* — Tables — */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0 1.5rem;
      font-size: 0.92rem;
    }
    th {
      background: var(--navy);
      color: #fff;
      font-weight: 600;
      text-align: left;
      padding: 0.6rem 0.75rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    td {
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    tr:hover td { background: rgba(10,34,64,0.03); }

    /* — Report cards (index page) — */
    .report-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--gold);
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      transition: box-shadow 0.2s;
    }
    .report-card:hover {
      box-shadow: 0 4px 16px rgba(10,34,64,0.08);
    }
    .report-card a {
      text-decoration: none;
    }
    .report-card .report-date {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .report-card .report-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.1rem;
      color: var(--navy);
      margin-top: 0.25rem;
    }
    .report-card .report-assessment {
      background: var(--navy);
      color: #fff;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    .report-highlights {
      margin: 0.5rem 0 0 1.25rem;
      padding: 0;
      list-style: none;
    }
    .report-highlights li {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 0.25rem;
      padding-left: 0.9rem;
      position: relative;
    }
    .report-highlights li::before {
      content: "\25AA";
      color: var(--gold);
      position: absolute;
      left: 0;
      font-size: 0.65rem;
      top: 0.2rem;
    }

    /* — Report page — */
    .report-meta {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .report-meta .badge {
      background: var(--navy);
      color: #fff;
      padding: 0.2rem 0.6rem;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .theater-filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .filter-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.3rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--gold); color: var(--navy); }
    .filter-btn.active {
      background: var(--navy);
      color: #fff;
      border-color: var(--navy);
    }
    .report-card .report-theater {
      background: var(--gold);
      color: var(--navy);
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-left: 0.5rem;
    }

    .back-link {
      display: inline-block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 1.5rem;
    }
    .back-link:hover { color: var(--gold); }

    /* — Blockquote (analyst notes) — */
    blockquote {
      border-left: 3px solid var(--gold);
      padding: 0.75rem 1rem;
      margin: 1rem 0;
      background: rgba(184,150,62,0.06);
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* — Code — */
    code {
      background: rgba(10,34,64,0.06);
      padding: 0.15rem 0.35rem;
      border-radius: 3px;
      font-size: 0.88em;
    }
    pre {
      background: var(--navy);
      color: #e0e6ed;
      padding: 1rem 1.25rem;
      border-radius: 4px;
      overflow-x: auto;
      margin: 1rem 0;
    }
    pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    /* — Footer — */
    footer {
      max-width: var(--max-width-wide);
      margin: 0 auto;
      padding: 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* — Hero (index) — */
    .hero {
      background: var(--navy);
      padding: 3rem 2rem;
      text-align: center;
      border-bottom: 3px solid var(--gold);
    }
    .hero h1 {
      font-family: 'Libre Baskerville', serif;
      color: #fff;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .hero p {
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
      max-width: 600px;
      margin: 0 auto;
    }

    @media (max-width: 768px) {
      .header-inner { padding: 1rem; flex-direction: column; gap: 0.5rem; }
      .header-nav a { margin-left: 0; margin-right: 1rem; }
      main { padding: 1.5rem 1rem; }
      .hero { padding: 2rem 1rem; }
      .hero h1 { font-size: 1.5rem; }
      h1 { font-size: 1.4rem; }
      .report-meta { flex-direction: column; gap: 0.5rem; }
    }
  </style>
  {% feed_meta %}
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}"><span>ICAI</span> Institute for Coding Agent Intelligence</a>
      <nav class="header-nav">
        <a href="{{ '/' | relative_url }}">Reports</a>
        <a href="{{ '/feed.xml' | relative_url }}">Feed</a>
      </nav>
    </div>
  </header>

  {{ content }}

  <footer>
    {{ site.title }} &mdash; autonomous intelligence produced by Claude Code
  </footer>
</body>
</html>
